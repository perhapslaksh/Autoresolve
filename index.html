<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoResolve AI — Autonomous Support System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden;">
    <div id="root" style="width: 100%; height: 100%;"></div>

    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Inline Dashboard Component -->
    <script type="text/babel">
        // ====== DASHBOARD COMPONENT ======
        const AutoResolveAIDashboard = () => {
            const [tickets, setTickets] = React.useState([]);
            const [selectedTicket, setSelectedTicket] = React.useState(null);
            const [ws, setWs] = React.useState(null);
            const [analytics, setAnalytics] = React.useState(null);
            const [filter, setFilter] = React.useState('all');
            const [demoRunning, setDemoRunning] = React.useState(false);
            const wsRef = React.useRef(null);

            // ====== WEBSOCKET CONNECTION ======
            React.useEffect(() => {
                const websocket = new WebSocket('ws://localhost:5000');

                websocket.onopen = () => {
                    console.log('✅ Connected to AutoResolve AI');
                };

                websocket.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.type === 'ticket_processed') {
                        setTickets(prev => [data.ticket, ...prev]);
                        fetchAnalytics();
                    }

                    if (data.type === 'demo_complete') {
                        setDemoRunning(false);
                    }
                };

                websocket.onerror = (error) => {
                    console.error('❌ WebSocket error:', error);
                };

                wsRef.current = websocket;
                setWs(websocket);

                return () => {
                    if (websocket.readyState === WebSocket.OPEN) {
                        websocket.close();
                    }
                };
            }, []);

            // ====== FETCH DATA ======
            const fetchAnalytics = async () => {
                try {
                    const response = await fetch('http://localhost:5000/analytics');
                    const data = await response.json();
                    setAnalytics(data);
                } catch (error) {
                    console.error('Error fetching analytics:', error);
                }
            };

            // ====== START DEMO ======
            const startDemo = async () => {
                setDemoRunning(true);
                setTickets([]);
                setSelectedTicket(null);

                try {
                    await fetch('http://localhost:5000/demo/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ count: 20 }),
                    });
                } catch (error) {
                    console.error('Error starting demo:', error);
                    setDemoRunning(false);
                }
            };

            // ====== FILTER TICKETS ======
            const filteredTickets = tickets.filter(ticket => {
                if (filter === 'all') return true;
                if (filter === 'resolved') return ticket.decision_data.decision === 'resolve';
                if (filter === 'escalated') return ticket.decision_data.decision === 'escalate';
                if (filter === 'critical') return ticket.classification.urgency === 'critical';
                return true;
            });

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
                    {/* HEADER */}
                    <header style={{
                        padding: '24px 32px',
                        background: 'linear-gradient(90deg, rgba(16, 185, 129, 0.1), rgba(139, 92, 246, 0.1))',
                        borderBottom: '1px solid rgba(148, 163, 184, 0.2)',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        backdropFilter: 'blur(10px)',
                        boxShadow: '0 4px 12px rgba(0, 0, 0, 0.3)',
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
                            <h1 style={{
                                fontSize: '28px',
                                fontWeight: '800',
                                margin: 0,
                                display: 'flex',
                                alignItems: 'center',
                                gap: '12px',
                                background: 'linear-gradient(135deg, #10b981, #8b5cf6)',
                                WebkitBackgroundClip: 'text',
                                WebkitTextFillColor: 'transparent',
                                backgroundClip: 'text',
                                fontFamily: 'Syne, sans-serif',
                                letterSpacing: '-0.5px',
                            }}>
                                <span style={{ fontSize: '32px', filter: 'drop-shadow(0 0 8px rgba(16, 185, 129, 0.3))' }}>⚡</span>
                                AutoResolve AI
                            </h1>
                            <p style={{
                                fontSize: '12px',
                                color: '#94a3b8',
                                fontWeight: '500',
                                letterSpacing: '0.5px',
                                textTransform: 'uppercase',
                                margin: 0,
                            }}>
                                Autonomous Multi-Agent Support System
                            </p>
                        </div>

                        <button 
                            onClick={startDemo}
                            disabled={demoRunning}
                            style={{
                                padding: '10px 24px',
                                background: 'linear-gradient(135deg, #10b981, #06b6d4)',
                                color: 'white',
                                border: 'none',
                                borderRadius: '8px',
                                fontWeight: '700',
                                fontSize: '13px',
                                cursor: demoRunning ? 'not-allowed' : 'pointer',
                                boxShadow: '0 4px 16px rgba(16, 185, 129, 0.3)',
                                textTransform: 'uppercase',
                                letterSpacing: '0.5px',
                                opacity: demoRunning ? 0.6 : 1,
                                fontFamily: 'Syne, sans-serif',
                                transition: 'all 0.3s ease',
                            }}
                            onMouseEnter={(e) => {
                                if (!demoRunning) {
                                    e.target.style.transform = 'translateY(-2px)';
                                    e.target.style.boxShadow = '0 8px 24px rgba(16, 185, 129, 0.5)';
                                }
                            }}
                            onMouseLeave={(e) => {
                                e.target.style.transform = 'translateY(0)';
                                e.target.style.boxShadow = '0 4px 16px rgba(16, 185, 129, 0.3)';
                            }}
                        >
                            {demoRunning ? '🔄 Demo Running...' : '▶ Start Demo'}
                        </button>
                    </header>

                    {/* MAIN CONTAINER */}
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: '320px 1fr 300px',
                        gap: '16px',
                        flex: 1,
                        overflow: 'hidden',
                        padding: '16px',
                        background: 'linear-gradient(180deg, #0f172a 0%, #020617 100%)',
                    }}>
                        {/* LEFT PANEL */}
                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            background: 'rgba(30, 41, 59, 0.7)',
                            border: '1px solid rgba(148, 163, 184, 0.2)',
                            borderRadius: '12px',
                            backdropFilter: 'blur(20px)',
                            overflow: 'hidden',
                            boxShadow: '0 4px 12px rgba(0, 0, 0, 0.3)',
                        }}>
                            <div style={{
                                padding: '16px',
                                borderBottom: '1px solid rgba(148, 163, 184, 0.2)',
                                display: 'flex',
                                justifyContent: 'space-between',
                                alignItems: 'center',
                            }}>
                                <h2 style={{
                                    fontSize: '16px',
                                    fontWeight: '700',
                                    margin: 0,
                                    fontFamily: 'Syne, sans-serif',
                                }}>📋 Ticket Stream</h2>
                            </div>

                            <div style={{
                                flex: 1,
                                overflowY: 'auto',
                                padding: '8px',
                                display: 'flex',
                                flexDirection: 'column',
                                gap: '8px',
                            }}>
                                {filteredTickets.length === 0 ? (
                                    <div style={{
                                        display: 'flex',
                                        flexDirection: 'column',
                                        justifyContent: 'center',
                                        alignItems: 'center',
                                        height: '100%',
                                        textAlign: 'center',
                                        color: '#94a3b8',
                                    }}>
                                        <p style={{ fontSize: '13px' }}>🎯 No tickets to display</p>
                                        <p style={{ fontSize: '11px', margin: '4px 0 0 0', color: '#94a3b8' }}>
                                            Click "Start Demo" to begin
                                        </p>
                                    </div>
                                ) : (
                                    filteredTickets.map(ticket => (
                                        <div
                                            key={ticket.id}
                                            onClick={() => setSelectedTicket(ticket)}
                                            style={{
                                                padding: '12px',
                                                background: selectedTicket?.id === ticket.id ? 'rgba(139, 92, 246, 0.1)' : 'rgba(30, 41, 59, 0.4)',
                                                border: selectedTicket?.id === ticket.id ? '1px solid #8b5cf6' : '1px solid rgba(148, 163, 184, 0.1)',
                                                borderRadius: '8px',
                                                cursor: 'pointer',
                                                transition: 'all 0.15s ease',
                                                boxShadow: selectedTicket?.id === ticket.id ? '0 0 20px rgba(139, 92, 246, 0.2)' : 'none',
                                            }}
                                            onMouseEnter={(e) => {
                                                if (selectedTicket?.id !== ticket.id) {
                                                    e.currentTarget.style.background = 'rgba(30, 41, 59, 0.6)';
                                                    e.currentTarget.style.borderColor = '#10b981';
                                                    e.currentTarget.style.boxShadow = 'inset 0 0 16px rgba(16, 185, 129, 0.1)';
                                                }
                                            }}
                                            onMouseLeave={(e) => {
                                                if (selectedTicket?.id !== ticket.id) {
                                                    e.currentTarget.style.background = 'rgba(30, 41, 59, 0.4)';
                                                    e.currentTarget.style.borderColor = 'rgba(148, 163, 184, 0.1)';
                                                    e.currentTarget.style.boxShadow = 'none';
                                                }
                                            }}
                                        >
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                                <span style={{
                                                    fontFamily: 'Monaco, monospace',
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    fontWeight: '600',
                                                }}>
                                                    {ticket.id.substring(0, 8)}...
                                                </span>
                                                <span style={{
                                                    width: '28px',
                                                    height: '28px',
                                                    borderRadius: '50%',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    color: 'white',
                                                    fontWeight: '700',
                                                    fontSize: '12px',
                                                    backgroundColor: ticket.decision_data.decision === 'resolve' ? '#10b981' : '#ef4444',
                                                    boxShadow: '0 2px 8px rgba(0, 0, 0, 0.3)',
                                                }}>
                                                    {ticket.decision_data.decision === 'resolve' ? '✓' : '⬆️'}
                                                </span>
                                            </div>
                                            <h3 style={{
                                                fontSize: '13px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                                color: '#f1f5f9',
                                                lineHeight: '1.4',
                                            }}>
                                                {ticket.subject.substring(0, 50)}...
                                            </h3>
                                            <div style={{
                                                display: 'flex',
                                                gap: '6px',
                                                marginBottom: '8px',
                                            }}>
                                                <span style={{
                                                    padding: '4px 8px',
                                                    borderRadius: '4px',
                                                    fontSize: '11px',
                                                    fontWeight: '600',
                                                    textTransform: 'uppercase',
                                                    backgroundColor: ticket.classification.urgency === 'critical' ? 'rgba(239, 68, 68, 0.35)' : 'rgba(239, 68, 68, 0.15)',
                                                    color: ticket.classification.urgency === 'critical' ? '#ff5555' : '#fca5a5',
                                                }}>
                                                    {ticket.classification.urgency}
                                                </span>
                                            </div>
                                            <div style={{
                                                display: 'flex',
                                                alignItems: 'center',
                                                gap: '8px',
                                            }}>
                                                <div style={{
                                                    flex: 1,
                                                    height: '4px',
                                                    background: 'rgba(148, 163, 184, 0.2)',
                                                    borderRadius: '2px',
                                                    overflow: 'hidden',
                                                }}>
                                                    <div style={{
                                                        height: '100%',
                                                        width: `${ticket.decision_data.confidence_score * 100}%`,
                                                        backgroundColor: ticket.decision_data.confidence_score > 0.7 ? '#10b981' : 
                                                                        ticket.decision_data.confidence_score > 0.5 ? '#f59e0b' : '#ef4444',
                                                        transition: 'width 0.5s ease-out',
                                                    }}></div>
                                                </div>
                                                <span style={{
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    fontWeight: '600',
                                                    minWidth: '35px',
                                                    textAlign: 'right',
                                                }}>
                                                    {(ticket.decision_data.confidence_score * 100).toFixed(0)}%
                                                </span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* CENTER PANEL */}
                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            background: 'rgba(30, 41, 59, 0.7)',
                            border: '1px solid rgba(148, 163, 184, 0.2)',
                            borderRadius: '12px',
                            backdropFilter: 'blur(20px)',
                            overflow: 'hidden',
                            boxShadow: '0 4px 12px rgba(0, 0, 0, 0.3)',
                        }}>
                            <div style={{
                                flex: 1,
                                overflowY: 'auto',
                                padding: '16px',
                            }}>
                                {selectedTicket ? (
                                    <>
                                        <h3 style={{
                                            fontSize: '18px',
                                            fontWeight: '700',
                                            color: '#f1f5f9',
                                            fontFamily: 'Syne, sans-serif',
                                            margin: '0 0 12px 0',
                                        }}>
                                            {selectedTicket.subject}
                                        </h3>
                                        <p style={{
                                            color: '#cbd5e1',
                                            lineHeight: '1.6',
                                            fontSize: '13px',
                                            margin: '0 0 20px 0',
                                        }}>
                                            {selectedTicket.body}
                                        </p>

                                        <div style={{
                                            display: 'grid',
                                            gridTemplateColumns: '1fr 1fr',
                                            gap: '12px',
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                            marginBottom: '16px',
                                        }}>
                                            <div>
                                                <p style={{
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    textTransform: 'uppercase',
                                                    letterSpacing: '0.3px',
                                                    fontWeight: '600',
                                                    margin: '0 0 4px 0',
                                                }}>Customer</p>
                                                <p style={{
                                                    fontSize: '13px',
                                                    color: '#f1f5f9',
                                                    fontWeight: '600',
                                                    margin: 0,
                                                }}>
                                                    {selectedTicket.email}
                                                </p>
                                            </div>
                                            <div>
                                                <p style={{
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    textTransform: 'uppercase',
                                                    letterSpacing: '0.3px',
                                                    fontWeight: '600',
                                                    margin: '0 0 4px 0',
                                                }}>Category</p>
                                                <p style={{
                                                    fontSize: '13px',
                                                    color: '#f1f5f9',
                                                    fontWeight: '600',
                                                    margin: 0,
                                                    textTransform: 'capitalize',
                                                }}>
                                                    {selectedTicket.classification.category}
                                                </p>
                                            </div>
                                            <div>
                                                <p style={{
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    textTransform: 'uppercase',
                                                    letterSpacing: '0.3px',
                                                    fontWeight: '600',
                                                    margin: '0 0 4px 0',
                                                }}>Urgency</p>
                                                <p style={{
                                                    fontSize: '13px',
                                                    color: '#f1f5f9',
                                                    fontWeight: '600',
                                                    margin: 0,
                                                    textTransform: 'capitalize',
                                                }}>
                                                    {selectedTicket.classification.urgency}
                                                </p>
                                            </div>
                                            <div>
                                                <p style={{
                                                    fontSize: '11px',
                                                    color: '#94a3b8',
                                                    textTransform: 'uppercase',
                                                    letterSpacing: '0.3px',
                                                    fontWeight: '600',
                                                    margin: '0 0 4px 0',
                                                }}>Confidence</p>
                                                <p style={{
                                                    fontSize: '13px',
                                                    color: '#f1f5f9',
                                                    fontWeight: '600',
                                                    margin: 0,
                                                }}>
                                                    {(selectedTicket.decision_data.confidence_score * 100).toFixed(0)}%
                                                </p>
                                            </div>
                                        </div>

                                        <div style={{
                                            padding: '12px',
                                            background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(16, 185, 129, 0.05))',
                                            border: '1px solid rgba(139, 92, 246, 0.2)',
                                            borderRadius: '8px',
                                        }}>
                                            <h4 style={{
                                                fontSize: '12px',
                                                fontWeight: '700',
                                                margin: '0 0 8px 0',
                                                color: '#8b5cf6',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontFamily: 'Syne, sans-serif',
                                            }}>🤖 AI Explanation</h4>
                                            <p style={{
                                                fontSize: '13px',
                                                color: '#cbd5e1',
                                                lineHeight: '1.6',
                                                margin: 0,
                                            }}>
                                                {selectedTicket.explanation}
                                            </p>
                                        </div>

                                        {selectedTicket.retry_count > 0 && (
                                            <div style={{
                                                marginTop: '16px',
                                                padding: '8px 12px',
                                                background: 'rgba(245, 158, 11, 0.1)',
                                                border: '1px solid #f59e0b',
                                                borderRadius: '6px',
                                                color: '#f59e0b',
                                                fontSize: '12px',
                                                fontWeight: '600',
                                            }}>
                                                🔄 Retries: {selectedTicket.retry_count}
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <div style={{
                                        display: 'flex',
                                        flexDirection: 'column',
                                        justifyContent: 'center',
                                        alignItems: 'center',
                                        height: '100%',
                                        textAlign: 'center',
                                        color: '#94a3b8',
                                    }}>
                                        <div style={{ fontSize: '48px', marginBottom: '16px' }}>🎯</div>
                                        <h3 style={{
                                            fontFamily: 'Syne, sans-serif',
                                            color: '#f1f5f9',
                                            marginBottom: '8px',
                                            fontSize: '16px',
                                        }}>
                                            Select a ticket to view details
                                        </h3>
                                        <p style={{ margin: 0 }}>
                                            Click any ticket on the left to see the AI's reasoning process
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT PANEL */}
                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            background: 'rgba(30, 41, 59, 0.7)',
                            border: '1px solid rgba(148, 163, 184, 0.2)',
                            borderRadius: '12px',
                            backdropFilter: 'blur(20px)',
                            overflow: 'hidden',
                            boxShadow: '0 4px 12px rgba(0, 0, 0, 0.3)',
                        }}>
                            <div style={{
                                padding: '16px',
                                borderBottom: '1px solid rgba(148, 163, 184, 0.2)',
                            }}>
                                <h2 style={{
                                    fontSize: '16px',
                                    fontWeight: '700',
                                    margin: 0,
                                    fontFamily: 'Syne, sans-serif',
                                }}>📊 Analytics</h2>
                            </div>

                            <div style={{
                                flex: 1,
                                overflowY: 'auto',
                                padding: '16px',
                                display: 'flex',
                                flexDirection: 'column',
                                gap: '12px',
                            }}>
                                {analytics ? (
                                    <>
                                        <div style={{
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                        }}>
                                            <p style={{
                                                fontSize: '11px',
                                                color: '#94a3b8',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                            }}>Total Tickets</p>
                                            <p style={{
                                                fontSize: '24px',
                                                fontWeight: '800',
                                                color: '#f1f5f9',
                                                margin: 0,
                                                fontFamily: 'Syne, sans-serif',
                                            }}>
                                                {analytics.total_tickets}
                                            </p>
                                        </div>

                                        <div style={{
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                        }}>
                                            <p style={{
                                                fontSize: '11px',
                                                color: '#94a3b8',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                            }}>Resolution Rate</p>
                                            <p style={{
                                                fontSize: '24px',
                                                fontWeight: '800',
                                                color: '#10b981',
                                                margin: 0,
                                                fontFamily: 'Syne, sans-serif',
                                            }}>
                                                {analytics.resolution_rate}
                                            </p>
                                        </div>

                                        <div style={{
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                        }}>
                                            <p style={{
                                                fontSize: '11px',
                                                color: '#94a3b8',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                            }}>Escalation Rate</p>
                                            <p style={{
                                                fontSize: '24px',
                                                fontWeight: '800',
                                                color: '#ef4444',
                                                margin: 0,
                                                fontFamily: 'Syne, sans-serif',
                                            }}>
                                                {analytics.escalation_rate}
                                            </p>
                                        </div>

                                        <div style={{
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                        }}>
                                            <p style={{
                                                fontSize: '11px',
                                                color: '#94a3b8',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                            }}>Avg Confidence</p>
                                            <p style={{
                                                fontSize: '24px',
                                                fontWeight: '800',
                                                color: '#f1f5f9',
                                                margin: 0,
                                                fontFamily: 'Syne, sans-serif',
                                            }}>
                                                {analytics.avg_confidence}
                                            </p>
                                        </div>

                                        <div style={{
                                            padding: '12px',
                                            background: 'rgba(30, 41, 59, 0.3)',
                                            border: '1px solid rgba(148, 163, 184, 0.2)',
                                            borderRadius: '8px',
                                            textAlign: 'center',
                                        }}>
                                            <p style={{
                                                fontSize: '11px',
                                                color: '#94a3b8',
                                                textTransform: 'uppercase',
                                                letterSpacing: '0.3px',
                                                fontWeight: '600',
                                                margin: '0 0 8px 0',
                                            }}>Tool Calls</p>
                                            <p style={{
                                                fontSize: '28px',
                                                fontWeight: '800',
                                                color: '#8b5cf6',
                                                margin: 0,
                                                fontFamily: 'Syne, sans-serif',
                                            }}>
                                                {analytics.tool_calls_made}
                                            </p>
                                        </div>
                                    </>
                                ) : (
                                    <div style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        height: '200px',
                                        color: '#94a3b8',
                                        fontSize: '13px',
                                    }}>
                                        Loading analytics...
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Mount the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AutoResolveAIDashboard />);
    </script>
