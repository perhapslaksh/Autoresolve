global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'autoresolve-ai'

scrape_configs:
  - job_name: 'autoresolve-ai'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:27017']
